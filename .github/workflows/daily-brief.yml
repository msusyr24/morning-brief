 
name: Generate Daily Brief

on:
  schedule:
    # Runs at 05:00 UTC daily (adjust for your timezone — see below)
    - cron: "17 5 * * *"
  workflow_dispatch:  # Lets you manually trigger from GitHub UI

permissions:
  contents: write

jobs:
  build-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python brief.py

      - name: Commit and push brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add brief.html suggestions_state.json raw_stories.txt yt_watermark.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily brief: $(date -u +'%Y-%m-%d')"
          git push